<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mental Neon - LIBRAS Social Sustentável</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            background-color: #0b0f19;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            color: white;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #map-container:active {
            cursor: grabbing;
        }

        .link {
            fill: none;
            stroke-width: 2px;
            opacity: 0.4;
            transition: stroke-width 0.3s;
        }
        .link.left { stroke: #10b981; }
        .link.right { stroke: #3b82f6; }
        .link.center { stroke: #10b981; }
        .link.bottom { stroke: #f59e0b; } 
        .link.top { stroke: #ec4899; }    

        .node circle {
            fill: #0b0f19;
            stroke-width: 2.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node.center circle { stroke: #10b981; stroke-width: 4px; filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.9)); }
        .node.left circle { stroke: #10b981; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6)); }
        .node.right circle { stroke: #3b82f6; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6)); }
        .node.bottom circle { stroke: #f59e0b; filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6)); }
        .node.top circle { stroke: #ec4899; filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.6)); }

        .node text {
            font-size: 11px;
            font-weight: 800;
            fill: #e2e8f0;
            text-anchor: middle;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #side-panel {
            position: fixed;
            right: -500px;
            top: 0;
            width: 500px;
            max-width: 100vw;
            height: 100vh;
            background: rgba(11, 15, 25, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            display: flex;
            flex-direction: column;
            box-shadow: -15px 0 35px rgba(0,0,0,0.9);
        }
        #side-panel.open { right: 0; }
        
        #panel-content {
            padding: 2rem;
            flex-grow: 1;
            overflow-y: auto;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .zoom-controls { position: fixed; bottom: 2rem; left: 2rem; display: flex; gap: 1rem; z-index: 40; }
        .zoom-btn {
            width: 50px; height: 50px; border-radius: 15px;
            background: rgba(30, 41, 59, 0.8); border: 1px solid #475569;
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(5px);
        }
        .zoom-btn:hover { background: #10b981; border-color: #10b981; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="map-container"></div>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()"><i class="fa-solid fa-plus"></i></button>
        <button class="zoom-btn" onclick="zoomOut()"><i class="fa-solid fa-minus"></i></button>
        <button class="zoom-btn" onclick="resetZoom()"><i class="fa-solid fa-crosshairs"></i></button>
    </div>

    <div id="side-panel">
        <button onclick="closePanel()" class="absolute top-4 right-6 text-gray-400 hover:text-white text-3xl z-50 transition-colors"><i class="fa-solid fa-xmark"></i></button>
        
        <div id="panel-header" class="p-8 border-b border-white/10">
            <h4 id="panel-subtitle" class="text-xs font-bold uppercase tracking-widest mb-2 text-emerald-400"></h4>
            <h2 id="panel-title" class="text-3xl font-black text-white"></h2>
        </div>
        
        <div id="panel-content">
            <div class="bg-white/5 border-l-4 border-emerald-500 p-5 rounded-2xl mb-6 text-emerald-50 font-medium" id="panel-desc-top"></div>
            
            <!-- Área Mídia Dinâmica -->
            <div id="panel-media-container" class="mb-6 w-full hidden flex flex-col gap-4">
                <!-- ÁUDIO (Sempre Visível se existir) -->
                <audio id="panel-audio" controls class="w-full hidden border border-white/10 rounded-full shadow-lg"></audio>
                
                <!-- CONTAINER PARA YOUTUBE -->
                <div id="panel-youtube" class="w-full aspect-video rounded-2xl overflow-hidden border-2 border-white/10 hidden">
                    <iframe id="iframe-youtube" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>

                <!-- VÍDEO LOCAL (Para o Cadeirante) -->
                <video id="panel-video" controls playsinline class="w-full max-h-64 rounded-2xl shadow-lg border-2 border-white/10 hidden bg-black object-contain"></video>
                
                <!-- IMAGEM/GIF -->
                <img id="panel-img" src="" class="w-full rounded-2xl border-2 border-white/10 hidden" alt="Conteúdo Visual">
            </div>

            <div class="bg-white/5 p-5 rounded-2xl border border-white/10" id="panel-conclusion-container">
                <h4 class="font-black text-emerald-400 uppercase text-xs mb-2 tracking-widest">Conclusão / Dica</h4>
                <p id="panel-desc-bottom" class="text-slate-400 text-sm"></p>
            </div>

            <!-- IA DA PROFESSORA SANDRA -->
            <button onclick="toggleAI()" class="mt-8 w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 transition-all">
                <i class="fa-solid fa-robot"></i> Dúvidas? Fale com a Profª Sandra ✨
            </button>
            <div id="ai-section" class="hidden mt-4 bg-black/30 p-4 rounded-2xl border border-emerald-500/20">
                <textarea id="ai-input" class="w-full bg-slate-900 text-sm p-3 rounded-lg outline-none border border-white/10 focus:border-emerald-500 transition-all" rows="2" placeholder="Pergunte algo sobre este tema..."></textarea>
                <button onclick="askAI()" id="btn-ai" class="w-full bg-emerald-600 mt-2 py-2 rounded-lg font-bold text-sm">Enviar Pergunta</button>
                <div id="ai-res" class="mt-3 text-xs text-emerald-100 leading-relaxed hidden"></div>
            </div>

            <div id="panel-pagination" class="flex justify-between items-center mt-8 hidden border-t border-white/10 pt-6">
                <button id="btn-prev" onclick="mudarPagina(-1)" class="text-sm font-bold text-emerald-400"><i class="fa-solid fa-arrow-left"></i> Anterior</button>
                <span id="page-indicator" class="text-xs font-bold text-gray-500"></span>
                <button id="btn-next" onclick="mudarPagina(1)" class="text-sm font-bold text-white">Próxima <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key tratada pelo ambiente

        // ==========================================
        // DADOS COMPLETOS E RESTAURADOS
        // ==========================================
        const mapData = {
            name: "LIBRAS\nSocial\nSustentável",
            side: "center",
            audio_src: "introducao.mp3",
            paginas: [{ 
                explicacao_top: "LIBRAS Social Sustentável: A língua como pilar de um ecossistema social baseado na equidade.", 
                explicacao_bottom: "Explore as ramificações ao redor para aprender." 
            }],
            children: [
                // 1. TOPO: DICIONÁRIO GIFS 
                {
                    name: "DICIONÁRIO\nGIFS 🤩", side: "top",
                    paginas: [
                        { explicacao_top: "Seja Bem-Vindo(a)! 👋", tipo_media: "video", media_src: "Seja Bem Vindo.mp4", explicacao_bottom: "O sinal de boas-vindas com inclusão total." },
                        { explicacao_top: "Sinal: Acordar 🥱", tipo_media: "img", media_src: "acordar.gif" },
                        { explicacao_top: "Sinal: Alegre 😄", tipo_media: "img", media_src: "alegre.gif" },
                        { explicacao_top: "Sinal: Amigo 🤝", tipo_media: "img", media_src: "amigo.gif" },
                        { explicacao_top: "Sinal: Amor ❤️", tipo_media: "img", media_src: "amor.gif" },
                        { explicacao_top: "Sinal: Ansioso 😰", tipo_media: "img", media_src: "ancioso.gif" },
                        { explicacao_top: "Sinal: Andar 🚶", tipo_media: "img", media_src: "andar.gif" },
                        { explicacao_top: "Sinal: Aniversário 🎂", tipo_media: "img", media_src: "aniversc3a1rio.gif" },
                        { explicacao_top: "Sinal: Aprender 🧠", tipo_media: "img", media_src: "aprender.gif" },
                        { explicacao_top: "Sinal: Banheiro 🚻", tipo_media: "img", media_src: "banheiro.gif" },
                        { explicacao_top: "Sinal: Tô com fome 🤤", tipo_media: "img", media_src: "https://media.giphy.com/media/n6rsNm2GMpE9EPoHCw/giphy.gif" },
                        { explicacao_top: "Sinal: Hoje é Sexta 🥳", tipo_media: "img", media_src: "https://media.giphy.com/media/bZ5Low664k5g6Y73cE/giphy.gif" },
                        { explicacao_top: "Sinal: Hoje! 📅", tipo_media: "img", media_src: "https://media.giphy.com/media/pEbTQiZfwk8TEgZKqZ/giphy.gif" },
                        { explicacao_top: "Sinal: Amei 😍", tipo_media: "img", media_src: "https://media.giphy.com/media/VhUehkp3JfvNBnBptr/giphy.gif" },
                        { explicacao_top: "Sinal: Feliz 😁", tipo_media: "img", media_src: "https://media.giphy.com/media/bB3bRooeqKQjfKTMYU/giphy.gif" }
                    ]
                },
                // 2. BAIXO: VIDEOAULAS (YOUTUBE EMBED)
                {
                    name: "VIDEOAULAS\n🎥", side: "bottom",
                    paginas: [
                        { explicacao_top: "Aula 1: Introdução à LIBRAS.", tipo_media: "video", media_src: "https://www.youtube.com/embed/CCHCqv2VLEY" },
                        { explicacao_top: "Aula 2: Cultura e Interação.", tipo_media: "video", media_src: "https://www.youtube.com/embed/uXUfkrz1JWw" },
                        { explicacao_top: "Aula 3: LIBRAS Social Sustentável.", tipo_media: "video", media_src: "https://www.youtube.com/embed/zhnNr6c2-fc" },
                        { explicacao_top: "Aula 4: Parâmetros e Estrutura.", tipo_media: "video", media_src: "https://www.youtube.com/embed/nEffA23geg4" },
                        { explicacao_top: "Bónus: Linguagem que se Vê.", tipo_media: "video", media_src: "https://www.youtube.com/embed/WMMCatLlNjw" },
                        { explicacao_top: "Bónus: Linguagem para os Olhos.", tipo_media: "video", media_src: "https://www.youtube.com/embed/eJICNZs7xz8" }
                    ]
                },
                // 3. ESQUERDA: TRILHAS E CULTURA (COM ÁUDIOS!)
                { 
                    name: "Trilhas de\nLIBRAS", side: "left", audio_src: "libra social sustentável.mp3",
                    children: [
                        { name: "O que é\nLIBRAS?", side: "left", audio_src: "O_que_e_libras.mp3", description: "LIBRAS é a Língua Brasileira de Sinais, reconhecida por lei." },
                        { 
                            name: "Inclusão\nSocial", side: "left", audio_src: "inclusao social.mp3",
                            children: [
                                { name: "Educação", side: "left", audio_src: "EDUCAÇÃO.mp3", description: "Escolas bilíngues e suporte visual são pilares." },
                                { name: "Saúde", side: "left", audio_src: "saude.mp3", description: "Atendimento médico com intérprete garante segurança." }
                            ]
                        },
                        { 
                            name: "Sustenta-\nbilidade", side: "left", audio_src: "sustentabilidade.mp3",
                            children: [
                                { name: "Trabalho", side: "left", audio_src: "trabalho.mp3", description: "Equidade no mercado de trabalho." },
                                { name: "Meio\nAmbiente", side: "left", audio_src: "meio ambiente.mp3", description: "Educação ambiental visual." },
                                { name: "Comunidade", side: "left", audio_src: "comunidade surda.mp3", description: "Redes de apoio e fortalecimento da identidade." }
                            ]
                        },
                        { 
                            name: "Cultura\nSurda", side: "left", audio_src: "cultura surda.mp3",
                            children: [
                                { name: "Tecnologia", side: "left", audio_src: "tec_acessivel.mp3", description: "Aplicativos que quebram barreiras." },
                                { name: "Arte", side: "left", audio_src: "arte.mp3", description: "Teatro e SignPoetry." },
                                { name: "Identidade", side: "left", audio_src: "identidade.mp3", description: "Uma experiência visual do mundo." }
                            ]
                        }
                    ]
                },
                // 4. DIREITA: DESAFIOS E BARREIRAS (COM ÁUDIOS!)
                {
                    name: "Desafios da\nInclusão", side: "right", audio_src: "desafios da inclusao.mp3",
                    children: [
                        {
                            name: "Barreiras", side: "right", audio_src: "barreiras de comunicaçãop.mp3",
                            children: [
                                { name: "Intérpretes", side: "right", audio_src: "barreiras fisicas e digitais.mp3", description: "A falta de intérpretes é uma barreira grave." }
                            ]
                        },
                        {
                            name: "Preconceito", side: "right", audio_src: "preconceito e discriminação.mp3",
                            children: [
                                { name: "Conscien-\ntização", side: "right", audio_src: "conscientizacao.mp3", description: "Educar para destruir o capacitismo." },
                                { name: "Políticas", side: "right", audio_src: "politicas publicas.mp3", description: "Legislação efetiva e fiscalização." }
                            ]
                        },
                        {
                            name: "Educação", side: "right", audio_src: "acesso a educacao.mp3",
                            children: [
                                { name: "Professores", side: "right", audio_src: "formação de professores.mp3", description: "Necessidade de formação contínua." },
                                { name: "Materiais", side: "right", audio_src: "materiais adaptados.mp3", description: "A carência de recursos visuais." }
                            ]
                        },
                        {
                            name: "Emprego", side: "right", audio_src: "empregabilidade.mp3",
                            children: [
                                { name: "Mercado", side: "right", audio_src: "mercado de trabalho.mp3", description: "Acolhimento real nas empresas." },
                                { name: "Capacitação", side: "right", audio_src: "capacitacao.mp3", description: "Cursos técnicos para autonomia." }
                            ]
                        }
                    ]
                }
            ]
        };

        // ==========================================
        // MOTOR D3.JS (CONTROLO DO MAPA)
        // ==========================================
        const container = d3.select("#map-container");
        let width = window.innerWidth, height = window.innerHeight;
        const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
        const svg = container.append("svg").attr("width", "100%").attr("height", "100%").call(zoom).on("dblclick.zoom", null);
        const g = svg.append("g");
        let initialTransform = d3.zoomIdentity.translate(width / 2, height / 2).scale(0.7);
        svg.call(zoom.transform, initialTransform);

        let root = d3.hierarchy(mapData);
        const treeLayout = d3.tree().nodeSize([90, 250]);
        let nodeIdCounter = 0;
        root.each(d => d.id = ++nodeIdCounter);

        function collapse(d) { if (d.children) { d._children = d.children; d._children.forEach(collapse); d.children = null; } }
        root.children.forEach(collapse);

        const linkGroup = g.append("g");
        const nodeGroup = g.append("g");

        function update() {
            treeLayout(root);
            const nodes = root.descendants(), links = root.links();
            nodes.forEach(d => {
                if (d.data.side === 'left') d.y = -Math.abs(d.y);
                if (d.data.side === 'bottom') { d.x = 240 + (d.x/3.5); d.y = d.y/4.5; }
                if (d.data.side === 'top') { d.x = -240 + (d.x/3.5); d.y = d.y/4.5; }
            });

            const node = nodeGroup.selectAll("g.node").data(nodes, d => d.id);
            const nodeEnter = node.enter().append("g").attr("class", d => `node ${d.data.side}`).attr("transform", d => `translate(${d.parent ? d.parent.y : 0},${d.parent ? d.parent.x : 0})`).on("click", click);
            nodeEnter.append("circle").attr("r", 1).style("opacity", 0);
            nodeEnter.append("text").attr("dy", ".35em").style("fill-opacity", 0).each(function(d) {
                const lines = d.data.name.split("\n"), yOffset = -((lines.length-1)*12)/2;
                d3.select(this).selectAll("tspan").data(lines).enter().append("tspan").attr("x", 0).attr("y", (l, idx) => yOffset + (idx*12)).text(l => l);
            });

            const nUpd = nodeEnter.merge(node).transition().duration(600).attr("transform", d => `translate(${d.y},${d.x})`);
            nUpd.select("circle").attr("r", d => d.depth === 0 ? 75 : (d.depth === 1 ? 60 : 45)).style("opacity", 1);
            nUpd.select("text").style("fill-opacity", 1);

            const link = linkGroup.selectAll("path.link").data(links, d => d.target.id);
            link.enter().append("path").attr("class", d => `link ${d.target.data.side}`).attr("d", d => {
                const o = {x: d.source.x, y: d.source.y};
                return d3.linkHorizontal().x(p => p.y).y(p => p.x)({source: o, target: o});
            }).merge(link).transition().duration(600).attr("d", d => {
                if (['top', 'bottom'].includes(d.target.data.side)) return d3.linkVertical().x(p => p.y).y(p => p.x)(d);
                return d3.linkHorizontal().x(p => p.y).y(p => p.x)(d);
            });
            node.exit().remove(); link.exit().remove();
        }

        const panel = document.getElementById('side-panel');
        let currentModalDados = null, currentPageIndex = 0;

        function openPanel(data) {
            currentModalDados = data; currentPageIndex = 0;
            document.getElementById('panel-title').innerText = data.name.replace(/\n/g, ' ');
            document.getElementById('panel-subtitle').innerText = data.side === 'bottom' ? "Videoaulas" : (data.side === 'top' ? "Dicionário" : "Conteúdo Inclusivo");
            document.getElementById('ai-res').classList.add('hidden');
            renderizarPaginaPanel(); panel.classList.add('open');
        }

        function renderizarPaginaPanel() {
            const pAud = document.getElementById('panel-audio'), pYT = document.getElementById('panel-youtube'), ifrYT = document.getElementById('iframe-youtube'), pVid = document.getElementById('panel-video'), pImg = document.getElementById('panel-img'), mediaCont = document.getElementById('panel-media-container'), pagination = document.getElementById('panel-pagination');
            
            let pgs = currentModalDados.paginas || [{ explicacao_top: currentModalDados.description || "Explore os tópicos para aprender.", tipo_media: currentModalDados.tipo_media, media_src: currentModalDados.media_src, audio_src: currentModalDados.audio_src }];
            const pAt = pgs[currentPageIndex];

            document.getElementById('panel-desc-top').innerText = pAt.explicacao_top;
            document.getElementById('panel-desc-bottom').innerText = pAt.explicacao_bottom || "Continue a jornada de estudos.";

            pAud.classList.add('hidden'); pYT.classList.add('hidden'); pVid.classList.add('hidden'); pImg.classList.add('hidden'); mediaCont.classList.add('hidden');
            pAud.pause(); pVid.pause(); ifrYT.src = "";

            if (pAt.audio_src) { pAud.src = pAt.audio_src; pAud.classList.remove('hidden'); mediaCont.classList.remove('hidden'); }
            
            if (pAt.tipo_media === 'video') {
                if (pAt.media_src.includes('youtube') || pAt.media_src.includes('youtu.be')) { 
                    ifrYT.src = pAt.media_src; pYT.classList.remove('hidden'); 
                } else { 
                    pVid.src = pAt.media_src; pVid.classList.remove('hidden'); 
                }
                mediaCont.classList.remove('hidden');
            } else if (pAt.tipo_media === 'img' || (pAt.media_src && (pAt.media_src.includes('giphy') || pAt.media_src.includes('.gif')))) {
                pImg.src = pAt.media_src; pImg.classList.remove('hidden'); mediaCont.classList.remove('hidden');
            }

            if (pgs.length > 1) {
                pagination.classList.remove('hidden');
                document.getElementById('page-indicator').innerText = `${currentPageIndex + 1} / ${pgs.length}`;
            } else pagination.classList.add('hidden');
        }

        function click(e, d) { e.stopPropagation(); openPanel(d.data); if (d.children) { d._children = d.children; d.children = null; } else { d.children = d._children; d._children = null; } update(); }
        function mudarPagina(dir) { let pgs = currentModalDados.paginas || []; if (currentPageIndex+dir >= 0 && currentPageIndex+dir < pgs.length) { currentPageIndex += dir; renderizarPaginaPanel(); } }
        function closePanel() { panel.classList.remove('open'); document.getElementById('panel-audio').pause(); document.getElementById('panel-video').pause(); document.getElementById('iframe-youtube').src = ""; }
        function zoomIn() { svg.transition().duration(400).call(zoom.scaleBy, 1.5); }
        function zoomOut() { svg.transition().duration(400).call(zoom.scaleBy, 0.65); }
        function resetZoom() { svg.transition().duration(600).call(zoom.transform, initialTransform); }

        function toggleAI() { document.getElementById('ai-section').classList.toggle('hidden'); }
        async function askAI() {
            const input = document.getElementById('ai-input').value; if(!input) return;
            const resDiv = document.getElementById('ai-res'); resDiv.classList.remove('hidden'); resDiv.innerText = "A pensar...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts: [{text: `Responda sobre LIBRAS: ${input}`}]}] })
                });
                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch(e) { resDiv.innerText = "Erro ao contactar a IA."; }
        }

        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; });
        update();
    </script>
</body>
</html>
